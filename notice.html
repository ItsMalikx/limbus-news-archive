<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notice | Limbus Company News Archive</title>
  <meta name="description" content="Read archived Limbus Company notices." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.ico">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="topbar__inner container-wide">
        <a class="brand" href="index.html">
          <span class="brand__mark"></span>
          <span class="brand__text">Limbus Company News Archive</span>
        </a>

        <nav class="topbar__actions" aria-label="Site actions">
          <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle dark mode">🌙</button>
        </nav>
      </div>
    </header>

    <main class="container-wide notice-layout">
      <article class="article-panel reveal">
        <div id="noticeContent" class="article-content"></div>

        <nav class="notice-pagination" aria-label="Notice navigation">
          <a id="prevNotice" class="notice-pagination__link" href="#" aria-disabled="true">← Previous</a>
          <a id="nextNotice" class="notice-pagination__link" href="#" aria-disabled="true">Next →</a>
        </nav>
      </article>
    </main>
  </div>

  <script type="module" src="assets/js/notice.js"></script>
</body>
</html>
