<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home | Limbus Company News Archive</title>
  <meta name="description" content="A searchable archive of Limbus Company notices." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="assets/css/styles.css" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="topbar__inner container-wide">
        <a class="brand" href="index.html">
          <span class="brand__mark"></span>
          <span class="brand__text">Limbus Company News Archive</span>
        </a>

        <nav class="topbar__actions" aria-label="Site actions">
          <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle dark mode">☾</button>
        </nav>
      </div>
    </header>

    <main class="container-wide archive-layout">
      <section class="content-panel">
        <div class="archive-hero reveal">
          <h1 class="hero-title">Limbus Company News Archive</h1>

          <div class="archive-hero__divider"></div>

          <div class="archive-controls">
            <div class="search-block">
              <div class="search-row">
                <div class="search-input-wrap">
                  <input id="searchInput" class="input" type="search" placeholder="Search notices..." autocomplete="off" />
                </div>
                <button id="filterToggle" class="filter-toggle icon-btn" type="button" aria-expanded="false" aria-label="Toggle filters">
                  <img src="assets/icons/filter-button.svg" alt="Filters" aria-hidden="true" style="width: 18px; height: 18px;">
                </button>
              </div>

              <div id="filterPanel" class="filter-panel" aria-hidden="true">
                <div id="filterPanelInner" class="filter-panel-inner">
                  <div class="filter-content">
                    <div class="filter-grid">
                      <section class="filter-section">
                        <h2>Search In</h2>
                        <div class="pill-row" id="scopePills">
                          <button type="button" class="pill scope-pill active" data-scope="title">Title</button>
                          <button type="button" class="pill scope-pill active" data-scope="content">Content</button>
                        </div>
                      </section>

                      <section class="filter-section">
                        <h2>Date Period</h2>
                        <div class="date-range">
                          <div class="date-input-wrap">
                            <input id="startDate" class="date-input" type="text" readonly placeholder="Start Date" />
                          </div>
                          <div class="date-separator">-</div>
                          <div class="date-input-wrap">
                            <input id="endDate" class="date-input" type="text" readonly placeholder="End Date" />
                          </div>

                          <div id="calendarDropdown" class="calendar-dropdown" style="display: none;">
                            <div class="calendar-header">
                              <button type="button" id="calPrevYear" class="cal-nav-btn">&laquo;</button>
                              <button type="button" id="calPrevMonth" class="cal-nav-btn">&lsaquo;</button>
                              <select id="calMonthSelect" class="cal-select"></select>
                              <select id="calYearSelect" class="cal-select"></select>
                              <button type="button" id="calNextMonth" class="cal-nav-btn">&rsaquo;</button>
                              <button type="button" id="calNextYear" class="cal-nav-btn">&raquo;</button>
                            </div>
                            <div class="calendar-grid-header">
                              <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
                            </div>
                            <div id="calendarDays" class="calendar-days"></div>
                          </div>
                        </div>
                      </section>

                      <section class="filter-section">
                        <h2>Tags</h2>
                        <div class="pill-row tag-pill-container" id="tagPills"></div>
                      </section>

                      <div class="filter-actions">
                        <button id="clearFilters" class="pill clear-pill" type="button">Clear Filters</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <p class="section-subtitle archive-results" id="resultsSummary">Loading results...</p>
            </div>
          </div>
        </div>

        <div id="noticeList" class="notice-list" aria-live="polite"></div>
        
        <div id="loadSentinel" style="height: 1px; width: 100%; margin-top: 20px;"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container-wide flex-col" style="align-items: center; gap: 14px;">
        <div>
          <a href="https://whosmalikx.com/privacy" class="footer-link">Privacy Policy</a>
        </div>
        <span class="text-muted" style="font-size: 0.85rem;">Copyright © 2026 Malik. All rights reserved.</span>
      </div>
    </footer>
  </div>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
